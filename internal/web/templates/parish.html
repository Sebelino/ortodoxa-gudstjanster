<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HWYRT0Y0BY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HWYRT0Y0BY');
    </script>
    <title>{{.Name}} – Ortodoxa Gudstjänster</title>
    <meta name="description" content="Gudstjänsttider och information om {{.Name}} i {{.City}}. {{.Tradition}} församling. Adress: {{.Address}}.">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://ortodoxagudstjanster.se/parish/{{.Slug}}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ortodoxagudstjanster.se/parish/{{.Slug}}">
    <meta property="og:title" content="{{.Name}} – Gudstjänsttider">
    <meta property="og:description" content="Gudstjänsttider och information om {{.Name}} i {{.City}}.">
    <style>
        {{template "theme-css" .}}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 14px;
        }

        header {
            background: linear-gradient(135deg, var(--header-from) 0%, var(--header-to) 100%);
            color: white;
            padding: 1rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        header .subtitle {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 0.25rem;
        }

        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 1rem;
        }

        .info-card {
            background: var(--surface);
            border-radius: 6px;
            box-shadow: 0 1px 3px var(--shadow);
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .info-card-header {
            background: var(--date-header);
            color: white;
            padding: 0.5rem 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .info-card-body {
            padding: 0.75rem;
        }

        .info-row {
            display: flex;
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            width: 100px;
            flex-shrink: 0;
            color: var(--text-label);
            font-size: 0.85rem;
        }

        .info-value {
            flex: 1;
        }

        .info-value a {
            color: var(--link);
            text-decoration: none;
        }

        .info-value a:hover {
            text-decoration: underline;
        }

        .cta {
            text-align: center;
            padding: 1rem;
        }

        .cta a {
            display: inline-block;
            background: var(--btn);
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .cta a:hover {
            background: var(--btn-hover);
        }

        .map-link {
            display: inline-block;
            margin-top: 0.25rem;
            font-size: 0.8rem;
        }

    </style>
    {{template "theme-flash" .}}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "PlaceOfWorship",
      "name": "{{.Name}}",
      "url": "{{.Website}}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "{{.Address}}",
        "addressLocality": "{{.City}}",
        "addressCountry": "SE"
      }
    }
    </script>
</head>
<body>
    <header>
        <h1>{{.Name}}</h1>
        <div class="subtitle">{{.Tradition}}</div>
    </header>

    <main>
        <div class="breadcrumb">
            <span><a href="/">Alla gudstjänster</a> &rsaquo; {{.ShortName}}</span>
            <button class="theme-toggle" id="theme-toggle" onclick="cycleTheme()"></button>
        </div>

        <div class="info-card">
            <div class="info-card-header">Information</div>
            <div class="info-card-body">
                <div class="info-row">
                    <span class="info-label">Tradition</span>
                    <span class="info-value">{{.Tradition}}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Adress</span>
                    <span class="info-value">
                        {{.Address}}
                        <a class="map-link" href="https://www.google.com/maps/search/?api=1&amp;query={{.MapQuery}}" target="_blank" rel="noopener">Visa p&aring; karta</a>
                    </span>
                </div>
                <div class="info-row">
                    <span class="info-label">Spr&aring;k</span>
                    <span class="info-value">{{.LanguagesStr}}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Webbplats</span>
                    <span class="info-value"><a href="{{.Website}}" target="_blank" rel="noopener">{{.WebsiteDisplay}}</a></span>
                </div>
            </div>
        </div>

        <div class="cta">
            <a href="/">Se kommande gudstj&auml;nster</a>
        </div>
    </main>
    {{template "theme-js" .}}
</body>
</html>
