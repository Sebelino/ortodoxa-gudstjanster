<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HWYRT0Y0BY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HWYRT0Y0BY');
    </script>
    <title>Ortodoxa församlingar – Ortodoxa Gudstjänster</title>
    <meta name="description" content="Lista över ortodoxa församlingar i Sverige. Grekisk-ortodoxa, rysk-ortodoxa, serbisk-ortodoxa och finska ortodoxa kyrkor med adresser och gudstjänsttider.">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://ortodoxagudstjanster.se/parishes">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ortodoxagudstjanster.se/parishes">
    <meta property="og:title" content="Ortodoxa församlingar">
    <meta property="og:description" content="Lista över ortodoxa församlingar i Sverige.">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <style>
        {{template "theme-css" .}}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 14px;
        }

        header {
            background: linear-gradient(135deg, var(--header-from) 0%, var(--header-to) 100%);
            color: white;
            padding: 1rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 1rem;
        }

        #map {
            height: 350px;
            border-radius: 6px;
            box-shadow: 0 1px 3px var(--shadow);
            margin-bottom: 1rem;
        }

        .parish-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .parish-card {
            background: var(--surface);
            border-radius: 6px;
            box-shadow: 0 1px 3px var(--shadow);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: box-shadow 0.15s;
        }

        .parish-card:hover {
            box-shadow: 0 2px 8px var(--shadow-hover);
        }

        .parish-card-body {
            padding: 0.75rem;
        }

        .parish-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--parish-name);
            margin-bottom: 0.2rem;
        }

        .parish-tradition {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .parish-address {
            font-size: 0.85rem;
            color: var(--text-label);
        }

    </style>
    {{template "theme-flash" .}}
</head>
<body>
    <header>
        <h1>Ortodoxa f&ouml;rsamlingar</h1>
    </header>

    <main>
        <div class="breadcrumb">
            <span><a href="/">Alla gudstj&auml;nster</a> &rsaquo; F&ouml;rsamlingar</span>
            <button class="theme-toggle" id="theme-toggle" onclick="cycleTheme()"></button>
        </div>

        <div id="map"></div>

        <div class="parish-list">
            {{range .}}
            <a class="parish-card" href="/parish/{{.Slug}}">
                <div class="parish-card-body">
                    <div class="parish-name">{{.Name}}</div>
                    <div class="parish-tradition">{{.Tradition}}</div>
                    <div class="parish-address">{{.Address}}</div>
                </div>
            </a>
            {{end}}
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        var parishes = [
            {{range .}}
            {name: "{{.ShortName}}", slug: "{{.Slug}}", lat: {{.Lat}}, lng: {{.Lng}}, address: "{{.Address}}"},
            {{end}}
        ];

        var map = L.map('map');
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 18
        }).addTo(map);

        var bounds = [];
        parishes.forEach(function(p) {
            var marker = L.marker([p.lat, p.lng]).addTo(map);
            marker.bindPopup('<b><a href="/parish/' + p.slug + '">' + p.name + '</a></b><br>' + p.address);
            bounds.push([p.lat, p.lng]);
        });

        map.fitBounds(bounds, {padding: [30, 30]});
    </script>
    {{template "theme-js" .}}
</body>
</html>
