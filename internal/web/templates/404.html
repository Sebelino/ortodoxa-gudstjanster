<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidan hittades inte – Ortodoxa Gudstjänster</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        {{template "theme-css" .}}
        {{template "layout-css" .}}

        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1rem;
            text-align: center;
        }

        .error-code {
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .error-message {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .back-link {
            display: inline-block;
            background: var(--btn);
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            background: var(--btn-hover);
        }
    </style>
    {{template "theme-flash" .}}
</head>
<body>
    {{template "site-header" .}}
    {{template "site-navbar" .}}

    <main>
        <div class="error-code">404</div>
        <p class="error-message">Sidan du s&ouml;ker kunde inte hittas.</p>
        <a class="back-link" href="/">Till startsidan</a>
    </main>
    {{template "site-footer-html" .}}
    {{template "theme-js" .}}
</body>
</html>
