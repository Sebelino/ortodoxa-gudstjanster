<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HWYRT0Y0BY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HWYRT0Y0BY');
    </script>
    <title>Feedback - Ortodoxa Gudstjänster</title>
    <style>
        {{template "theme-css" .}}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 14px;
        }

        header {
            background: linear-gradient(135deg, var(--header-from) 0%, var(--header-to) 100%);
            color: white;
            padding: 1rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }

        .form-container {
            background: var(--surface);
            border-radius: 6px;
            padding: 1.5rem;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .form-container h2 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--parish-name);
        }

        .form-container p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.35rem;
            color: var(--label);
        }

        select, input, textarea {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--form-border);
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--link);
            box-shadow: 0 0 0 2px rgba(44, 82, 130, 0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            background: var(--btn);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }

        .submit-btn:hover {
            background: var(--btn-hover);
        }

        .submit-btn:disabled {
            background: var(--btn-disabled);
            cursor: not-allowed;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .message.success {
            background: var(--msg-success-bg);
            color: var(--msg-success-text);
        }

        .message.error {
            background: var(--error-bg);
            color: var(--error-text);
        }

        .hidden {
            display: none;
        }

        /* Honeypot field - hidden from humans, visible to bots */
        .website-field {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            height: 0;
            width: 0;
            z-index: -1;
        }
    </style>
    {{template "theme-flash" .}}
</head>
<body>
    <header>
        <h1>Feedback</h1>
    </header>

    <main>
        <div class="breadcrumb">
            <span><a href="/">&larr; Tillbaka till kalendern</a></span>
            <button class="theme-toggle" id="theme-toggle" onclick="cycleTheme()"></button>
        </div>

        <div class="form-container">
            <h2>Skicka feedback</h2>
            <p>Rapportera fel i schemat, be om att en ny församling läggs till, eller skicka andra synpunkter.</p>

            <div id="message" class="message hidden"></div>

            <form id="feedback-form">
                <div class="form-group">
                    <label for="type">Typ av feedback</label>
                    <select id="type" name="type" required>
                        <option value="">Välj...</option>
                        <option value="error">Fel i schemat</option>
                        <option value="new_parish">Lägg till församling</option>
                        <option value="suggestion">Förslag</option>
                        <option value="other">Annat</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="email">E-post (valfritt)</label>
                    <input type="email" id="email" name="email" placeholder="din@email.se">
                </div>

                <div class="form-group">
                    <label for="message">Meddelande</label>
                    <textarea id="message-input" name="message" required placeholder="Beskriv ditt ärende..."></textarea>
                </div>

                <!-- Honeypot field - hidden from humans -->
                <div class="website-field" aria-hidden="true">
                    <label for="website">Website</label>
                    <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Skicka</button>
            </form>
        </div>
    </main>

    <script>
        const form = document.getElementById('feedback-form');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submit-btn');
        const formLoadTime = Date.now();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Skickar...';
            messageDiv.classList.add('hidden');

            const formData = {
                type: document.getElementById('type').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message-input').value,
                website: document.getElementById('website').value,
                timestamp: formLoadTime
            };

            try {
                const response = await fetch('/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    messageDiv.textContent = 'Tack för din feedback! Vi har tagit emot ditt meddelande.';
                    messageDiv.className = 'message success';
                    form.reset();
                } else {
                    const error = await response.text();
                    throw new Error(error || 'Något gick fel');
                }
            } catch (error) {
                messageDiv.textContent = 'Kunde inte skicka: ' + error.message;
                messageDiv.className = 'message error';
            }

            messageDiv.classList.remove('hidden');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Skicka';
        });
    </script>
    {{template "theme-js" .}}
</body>
</html>
