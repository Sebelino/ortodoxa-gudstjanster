<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1a365d"/>
  <!-- Vertical shaft -->
  <rect x="14" y="3" width="4" height="26" fill="#d4af37"/>
  <!-- Top bar (titulus) -->
  <rect x="9" y="6" width="14" height="3.5" fill="#d4af37"/>
  <!-- Main crossbeam -->
  <rect x="4" y="13" width="24" height="4" fill="#d4af37"/>
  <!-- Diagonal footrest (suppedaneum) — left side higher -->
  <line x1="9" y1="23" x2="23" y2="26.5" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
</svg>
